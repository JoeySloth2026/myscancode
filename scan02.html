<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>条码采集系统 - Google Sheets 版</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --bg: #F2F2F7;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* 顶部商品选择区 */
        .config-panel { background: white; padding: 20px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        h3 { margin-top: 0; font-size: 16px; color: #333; }
        select, .type-btn-group { width: 100%; margin-bottom: 15px; }
        select { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }

        /* 按钮样式 */
        .type-btn-group { display: flex; gap: 10px; }
        .type-btn { flex: 1; padding: 10px; border: 1px solid var(--primary); background: white; color: var(--primary); border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .type-btn.active { background: var(--primary); color: white; }

        /* 扫描器显示区 */
        #scanner-container { width: 100%; max-width: 500px; margin: 10px auto; background: black; position: relative; border-radius: 12px; overflow: hidden; display: none; }
        #reader { width: 100%; }
        
        /* 状态提示 */
        .status-box { padding: 15px; text-align: center; color: #666; font-size: 14px; }
        #log { margin: 10px; padding: 10px; background: #eee; border-radius: 5px; font-family: monospace; font-size: 12px; max-height: 100px; overflow-y: auto; }

        /* 成功闪烁动画 */
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(52, 199, 89, 0.4); pointer-events: none; opacity: 0; z-index: 1000; }
    </style>
</head>
<body>

<div id="flash"></div>

<div class="config-panel">
    <h3>1. 选择商品</h3>
    <select id="product-select" onchange="updateInfo()">
        <option value="">正在获取商品列表...</option>
    </select>

    <h3>2. 选择包装类型</h3>
    <div class="type-btn-group">
        <button class="type-btn active" onclick="setType('Unit', this)">单品 (Unit)</button>
        <button class="type-btn" onclick="setType('Inner', this)">内盒 (Inner)</button>
        <button class="type-btn" onclick="setType('Carton', this)">外箱 (Carton)</button>
    </div>

    <button id="start-btn" onclick="toggleScanner()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold;">开启摄像头</button>
</div>

<div id="scanner-container">
    <div id="reader"></div>
</div>

<div class="status-box">
    <div id="info-display">请选择商品开始扫码</div>
    <div id="last-result" style="margin-top:10px; color:var(--success); font-weight:bold;"></div>
</div>

<div id="log">系统日志已准备...</div>

<script>
    // --- 核心配置：请替换为你自己的 Google Apps Script URL ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyd5U8fFSsTyiNYOLy3MAEFafv6mBeS-F23I53gCAzB8kE46frtOlaT8k9o36PZoh2f/exec"; 

    let html5QrCode;
    let selectedType = 'Unit';
    let isProcessing = false;

    // 1. 初始化：获取商品列表
    async function fetchProducts() {
        log("正在从 Google Sheets 获取商品...");
        try {
            const response = await fetch(`${GAS_URL}?action=getProducts`);
            const products = await response.json();
            const select = document.getElementById('product-select');
            select.innerHTML = '<option value="">-- 请选择商品 --</option>';
            products.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p.id;
                opt.innerText = `${p.name} (${p.spec || '无规格'})`;
                select.appendChild(opt);
            });
            log("商品列表加载成功");
        } catch (err) {
            log("获取失败: " + err);
        }
    }

    // 2. 选择设置
    function setType(type, btn) {
        selectedType = type;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateInfo();
    }

    function updateInfo() {
        const select = document.getElementById('product-select');
        const productName = select.options[select.selectedIndex].text;
        if(select.value) {
            document.getElementById('info-display').innerText = `当前模式：为 [${productName}] 采集 [${selectedType}] 条码`;
        }
    }

    // 3. 扫描控制
    function toggleScanner() {
        const container = document.getElementById('scanner-container');
        const btn = document.getElementById('start-btn');
        const select = document.getElementById('product-select');

        if (!select.value) {
            alert("请先选择商品！");
            return;
        }

        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                container.style.display = 'none';
                btn.innerText = "开启摄像头";
            });
        } else {
            container.style.display = 'block';
            btn.innerText = "关闭摄像头";
            startCamera();
        }
    }

    function startCamera() {
        html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 15, 
            qrbox: { width: 280, height: 150 },
            aspectRatio: 1.0 
        };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    }

    // 4. 扫码成功处理
    async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        
        const productId = document.getElementById('product-select').value;
        if (!productId) return;

        isProcessing = true;
        flashSuccess();
        document.getElementById('last-result').innerText = "识别到: " + decodedText;
        log(`正在上传 ${selectedType} 码: ${decodedText}`);

        try {
            // 发送数据到 Google Sheets
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // 跨域模式
                body: JSON.stringify({
                    productId: productId,
                    barcode: decodedText,
                    type: selectedType
                })
            });
            
            log("保存成功！");
            document.getElementById('last-result').innerText = "已保存: " + decodedText;
        } catch (err) {
            log("保存失败: " + err);
        }

        // 2.5秒防抖
        setTimeout(() => { isProcessing = false; }, 2500);
    }

    // 辅助功能
    function flashSuccess() {
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.opacity = '0'; }, 200);
    }

    function log(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML = `> ${msg}<br>` + logDiv.innerHTML;
    }

    // 页面加载自动获取数据
    window.onload = fetchProducts;
</script>

</body>
</html>
