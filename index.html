<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>条码采集系统 - 二级目录版</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --error: #FF3B30;
            --warning: #FF9500;
            --bg: #F2F2F7;
            --card: #FFFFFF;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; padding-bottom: 70px; }
        
        .config-panel { background: var(--card); padding: 20px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        h3 { margin: 0 0 8px 0; font-size: 14px; color: #666; }
        h4 { margin: 12px 0 6px 0; font-size: 13px; color: #888; }
        
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; margin-bottom: 12px; background: white; }
        select:disabled { background: #F8F9FA; color: #999; }
        
        .type-btn-group { display: flex; gap: 10px; margin-bottom: 16px; }
        .type-btn { flex: 1; padding: 12px; border: 1px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; cursor: pointer; font-weight: 500; }
        .type-btn.active { background: var(--primary); color: white; }
        
        .primary-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 16px; cursor: pointer; }
        .primary-btn:active { transform: scale(0.98); }
        
        #scanner-container { width: 100%; max-width: 500px; margin: 10px auto; background: black; border-radius: 12px; overflow: hidden; display: none; }
        #reader { width: 100%; }
        
        .info-card { background: var(--card); margin: 16px; padding: 16px; border-radius: 12px; }
        .status-box { text-align: center; }
        #info-display { font-size: 15px; background: #F8F9FA; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
        
        .current-barcode { margin-top: 12px; padding: 10px; background: #E8F4FD; border-radius: 8px; display: none; }
        .current-barcode .label { color: #666; font-size: 12px; }
        .current-barcode .value { color: var(--primary); font-weight: 600; font-family: monospace; }
        
        #last-result { margin-top: 12px; color: var(--success); font-weight: 600; font-size: 14px; }
        
        #log { margin: 16px; padding: 12px; background: #1C1C1E; border-radius: 10px; font-family: monospace; font-size: 11px; max-height: 150px; overflow-y: auto; color: #34C759; }
        .log-error { color: #FF453A !important; }
        
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(52, 199, 89, 0.6); pointer-events: none; opacity: 0; z-index: 1000; transition: opacity 0.1s; }
        
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 25px; font-size: 14px; z-index: 1001; animation: fadeInOut 2s ease; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
        
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); padding: 10px 16px; border-top: 1px solid #ddd; display: flex; gap: 12px; z-index: 99; }
        .bottom-bar button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .btn-history { background: #F8F9FA; color: #333; }
        .btn-stats { background: #E8F4FD; color: var(--primary); }
        .btn-reset { background: #FEF2F0; color: var(--error); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 20px; padding: 20px; width: 90%; max-width: 340px; max-height: 80vh; overflow-y: auto; }
        .modal-header { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .barcode-info { margin: 12px 0; padding: 10px; background: #F8F9FA; border-radius: 8px; }
        .barcode-info .type { font-weight: 600; margin-bottom: 4px; }
        .barcode-info .code { font-family: monospace; color: var(--primary); }
        .modal-close { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; margin-top: 16px; cursor: pointer; }
        
        .stats { display: flex; gap: 12px; margin-top: 12px; }
        .stat-item { flex: 1; text-align: center; padding: 8px; background: #F8F9FA; border-radius: 8px; }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 11px; color: #666; margin-top: 4px; }
        
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #f3f3f3; border-top: 2px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="flash"></div>

<div class="config-panel">
    <h3>📁 1. 选择商品目录</h3>
    <select id="catalog-select">
        <option value="">-- 请选择目录 --</option>
    </select>

    <h3>📦 2. 选择商品</h3>
    <select id="product-select" disabled>
        <option value="">-- 请先选择目录 --</option>
    </select>

    <h3>🏷️ 3. 选择包装类型</h3>
    <div class="type-btn-group">
        <button class="type-btn" data-type="Unit">📄 单品</button>
        <button class="type-btn active" data-type="Inner">📦 内盒</button>
        <button class="type-btn" data-type="Carton">📦 外箱</button>
    </div>

    <button id="start-btn" class="primary-btn">📷 开启摄像头</button>
</div>

<div id="scanner-container">
    <div id="reader"></div>
</div>

<div class="info-card">
    <div class="status-box">
        <div id="info-display">请选择目录和商品开始扫码</div>
        <div id="current-barcode" class="current-barcode">
            <div class="label">当前条码</div>
            <div class="value" id="current-barcode-value">-</div>
        </div>
        <div id="last-result"></div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="scan-count">0</div>
                <div class="stat-label">今日扫描</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="progress">0%</div>
                <div class="stat-label">完成进度</div>
            </div>
        </div>
    </div>
</div>

<div id="log">✨ 系统已启动，正在加载目录...</div>

<div class="bottom-bar">
    <button class="btn-history" onclick="showHistory()">📋 扫码记录</button>
    <button class="btn-stats" onclick="showProductDetail()">🔍 商品详情</button>
    <button class="btn-reset" onclick="resetForm()">🔄 重置</button>
</div>

<div id="product-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header" id="modal-title">商品详情</div>
        <div id="modal-body"></div>
        <button class="modal-close" onclick="closeModal()">关闭</button>
    </div>
</div>

<script>
    // ==================== 配置 ====================
    // ⚠️ 请替换为你的 GAS Web App URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw9AA5fWCCCjowDZORq5Vr8ab7uYnr7FjQQO_SIx8KKo8sfQlqlxZaq4Yn0gwr-A5gK/exec";
    
    // ==================== 全局变量 ====================
    let html5QrCode;
    let selectedType = 'Inner';
    let isProcessing = false;
    let catalogs = [];
    let productsByCatalog = {};
    let currentProduct = null;
    let allProducts = [];
    
    // DOM 元素
    const catalogSelect = document.getElementById('catalog-select');
    const productSelect = document.getElementById('product-select');
    const startBtn = document.getElementById('start-btn');
    const scannerContainer = document.getElementById('scanner-container');
    const infoDisplay = document.getElementById('info-display');
    const lastResultEl = document.getElementById('last-result');
    
    // ==================== 1. 获取目录分类 ====================
    async function fetchCatalogs() {
        log("正在获取商品目录...");
        try {
            const response = await fetch(`${GAS_URL}?action=getCatalogs&t=${Date.now()}`);
            const result = await response.json();
            
            if (result.success) {
                catalogs = result.data;
                catalogSelect.innerHTML = '<option value="">-- 请选择目录 --</option>';
                catalogs.forEach(catalog => {
                    const option = document.createElement('option');
                    option.value = catalog;
                    option.textContent = catalog;
                    catalogSelect.appendChild(option);
                });
                log(`✅ 目录加载成功，共 ${catalogs.length} 个分类`);
                
                // 恢复上次选择的目录
                const lastCatalog = localStorage.getItem('lastCatalog');
                if (lastCatalog && catalogs.includes(lastCatalog)) {
                    catalogSelect.value = lastCatalog;
                    await loadProductsByCatalog(lastCatalog);
                }
            } else {
                throw new Error(result.error);
            }
        } catch (err) {
            log(`❌ 获取目录失败: ${err.message}`, true);
            catalogSelect.innerHTML = '<option value="">加载失败，请刷新页面</option>';
        }
    }
    
    // ==================== 2. 根据目录获取商品 ====================
    async function loadProductsByCatalog(catalog) {
        if (!catalog) {
            productSelect.innerHTML = '<option value="">-- 请先选择目录 --</option>';
            productSelect.disabled = true;
            currentProduct = null;
            updateInfo();
            return;
        }
        
        log(`正在加载目录 "${catalog}" 下的商品...`);
        productSelect.innerHTML = '<option value="">加载中...</option>';
        productSelect.disabled = true;
        
        try {
            const response = await fetch(`${GAS_URL}?action=getProductsByCatalog&catalog=${encodeURIComponent(catalog)}`);
            const result = await response.json();
            
            if (result.success) {
                productsByCatalog[catalog] = result.data;
                productSelect.innerHTML = '<option value="">-- 请选择商品 --</option>';
                
                result.data.forEach(product => {
                    const option = document.createElement('option');
                    option.value = product.id;
                    option.textContent = `${product.name} ${product.spec ? `(${product.spec})` : ''}`;
                    productSelect.appendChild(option);
                });
                
                productSelect.disabled = false;
                log(`✅ 加载商品成功，共 ${result.data.length} 个商品`);
                
                // 恢复上次选择的商品
                const lastProductId = localStorage.getItem('lastProductId');
                if (lastProductId && result.data.find(p => p.id === lastProductId)) {
                    productSelect.value = lastProductId;
                    await loadProductDetail(lastProductId);
                }
                
                // 更新全局商品列表用于统计
                await fetchAllProducts();
            } else {
                throw new Error(result.error);
            }
        } catch (err) {
            log(`❌ 加载商品失败: ${err.message}`, true);
            productSelect.innerHTML = '<option value="">加载失败，请重试</option>';
        }
    }
    
    // 获取所有商品（用于统计）
    async function fetchAllProducts() {
        try {
            const response = await fetch(`${GAS_URL}?action=getAllProducts`);
            const result = await response.json();
            if (result.success) {
                allProducts = result.data;
                await fetchStats();
            }
        } catch(e) { console.error(e); }
    }
    
    // 获取统计信息
    async function fetchStats() {
        try {
            const response = await fetch(`${GAS_URL}?action=getStats`);
            const result = await response.json();
            if (result.success) {
                const stats = result.data;
                const progress = Math.round((stats.completedProducts / stats.totalProducts) * 100);
                document.getElementById('progress').textContent = `${progress}%`;
            }
        } catch(e) { console.error(e); }
    }
    
    // 加载商品详情
    async function loadProductDetail(productId) {
        try {
            const response = await fetch(`${GAS_URL}?action=getProduct&id=${encodeURIComponent(productId)}`);
            const result = await response.json();
            if (result.success) {
                currentProduct = result.data;
                updateInfo();
                updateCurrentBarcode();
            }
        } catch(e) { console.error(e); }
    }
    
    // ==================== 3. UI 交互 ====================
    function setType(type, btn) {
        selectedType = type;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateInfo();
        updateCurrentBarcode();
        localStorage.setItem('lastType', type);
    }
    
    function updateInfo() {
        const catalog = catalogSelect.value;
        const productId = productSelect.value;
        
        if (catalog && productId && currentProduct) {
            const typeNames = { Unit: '单品', Inner: '内盒', Carton: '外箱' };
            const currentBarcode = currentProduct.barcodes?.[selectedType];
            const barcodeStatus = currentBarcode && currentBarcode !== "" ? `已有: ${currentBarcode}` : "未录入";
            
            infoDisplay.innerHTML = `${currentProduct.name} ${currentProduct.spec ? `(${currentProduct.spec})` : ''}<br>${typeNames[selectedType]} - ${barcodeStatus}`;
        } else if (catalog && !productId) {
            infoDisplay.innerHTML = "请选择商品";
        } else {
            infoDisplay.innerHTML = "请选择目录和商品开始扫码";
        }
    }
    
    function updateCurrentBarcode() {
        const barcodeDiv = document.getElementById('current-barcode');
        if (currentProduct && currentProduct.barcodes && currentProduct.barcodes[selectedType]) {
            const barcode = currentProduct.barcodes[selectedType];
            if (barcode && barcode !== "") {
                document.getElementById('current-barcode-value').textContent = barcode;
                barcodeDiv.style.display = 'block';
            } else {
                barcodeDiv.style.display = 'none';
            }
        } else {
            barcodeDiv.style.display = 'none';
        }
    }
    
    function resetForm() {
        catalogSelect.value = "";
        productSelect.innerHTML = '<option value="">-- 请先选择目录 --</option>';
        productSelect.disabled = true;
        currentProduct = null;
        infoDisplay.innerHTML = "请选择目录和商品开始扫码";
        document.getElementById('current-barcode').style.display = 'none';
        lastResultEl.innerHTML = "";
        
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                scannerContainer.style.display = 'none';
                startBtn.innerText = "📷 开启摄像头";
            });
        }
        
        showToast("已重置");
        localStorage.removeItem('lastCatalog');
        localStorage.removeItem('lastProductId');
    }
    
    function showProductDetail() {
        if (!currentProduct) { showToast("请先选择商品"); return; }
        const typeNames = { Unit: '单品', Inner: '内盒', Carton: '外箱' };
        let html = `<div><strong>商品ID:</strong> ${currentProduct.id}</div>`;
        html += `<div><strong>商品名称:</strong> ${currentProduct.name}</div>`;
        html += `<div><strong>规格:</strong> ${currentProduct.spec || '-'}</div>`;
        html += `<div><strong>所属目录:</strong> ${currentProduct.catalog || '-'}</div>`;
        html += `<div style="margin-top:12px;"><strong>条码信息:</strong></div>`;
        
        for (const [type, name] of Object.entries(typeNames)) {
            const barcode = currentProduct.barcodes?.[type];
            html += `<div class="barcode-info"><div class="type">${name}</div><div class="code">${barcode && barcode !== "" ? barcode : '❌ 未录入'}</div></div>`;
        }
        
        document.getElementById('modal-title').textContent = `📦 ${currentProduct.name}`;
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('product-modal').style.display = 'flex';
    }
    
    function closeModal() { document.getElementById('product-modal').style.display = 'none'; }
    
    function showHistory() {
        const history = JSON.parse(localStorage.getItem('scanHistory') || '[]');
        if (history.length === 0) { showToast("暂无扫描记录"); return; }
        const typeNames = { Unit: '单品', Inner: '内盒', Carton: '外箱' };
        let html = `<div style="max-height:400px;overflow-y:auto;">`;
        history.slice(-20).reverse().forEach(record => {
            html += `<div class="barcode-info"><div><strong>${record.productName || record.productId}</strong> - ${typeNames[record.type]}</div><div class="code">${record.barcode}</div><div style="font-size:11px;color:#666;">${new Date(record.timestamp).toLocaleString()}</div></div>`;
        });
        html += `</div>`;
        document.getElementById('modal-title').textContent = `📋 扫描记录 (${history.length})`;
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('product-modal').style.display = 'flex';
    }
    
    // ==================== 4. 提交条码 ====================
    async function submitBarcode(productId, barcode, type, productName) {
        try {
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    productId: productId, 
                    barcode: barcode, 
                    type: type, 
                    timestamp: Date.now() 
                })
            });
            
            // 保存到本地历史
            const history = JSON.parse(localStorage.getItem('scanHistory') || '[]');
            history.push({ 
                productId: productId, 
                productName: productName,
                barcode: barcode, 
                type: type, 
                timestamp: Date.now() 
            });
            while (history.length > 200) history.shift();
            localStorage.setItem('scanHistory', JSON.stringify(history));
            
            // 更新计数
            let scanCount = parseInt(localStorage.getItem('scanCount') || '0');
            scanCount++;
            localStorage.setItem('scanCount', scanCount);
            document.getElementById('scan-count').textContent = scanCount;
            
            // 更新当前商品
            if (currentProduct && currentProduct.id === productId) {
                if (!currentProduct.barcodes) currentProduct.barcodes = {};
                currentProduct.barcodes[type] = barcode;
                updateCurrentBarcode();
                updateInfo();
            }
            
            log(`✅ ${type} 条码保存成功: ${barcode}`);
            showToast("保存成功！");
            lastResultEl.innerHTML = `✅ 已保存: ${barcode}<br>⏰ ${new Date().toLocaleTimeString()}`;
            return true;
        } catch (err) {
            log(`❌ 保存失败: ${err.message}`, true);
            showToast(`保存失败: ${err.message}`);
            return false;
        }
    }
    
    // ==================== 5. 扫码成功 ====================
    async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        
        const productId = productSelect.value;
        if (!productId) { showToast("请先选择商品"); return; }
        if (!decodedText || decodedText.length < 3) { log("⚠️ 条码格式异常", true); return; }
        
        isProcessing = true;
        flashSuccess();
        lastResultEl.innerText = "识别到: " + decodedText;
        log(`正在上传 ${selectedType} 码: ${decodedText}`);
        
        const productName = currentProduct ? currentProduct.name : productId;
        await submitBarcode(productId, decodedText, selectedType, productName);
        
        setTimeout(() => { isProcessing = false; }, 2000);
    }
    
    // ==================== 6. 摄像头控制 ====================
    function toggleScanner() {
        if (!catalogSelect.value) { showToast("请先选择目录"); return; }
        if (!productSelect.value) { showToast("请先选择商品"); return; }
        
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                scannerContainer.style.display = 'none';
                startBtn.innerText = "📷 开启摄像头";
            });
        } else {
            scannerContainer.style.display = 'block';
            startBtn.innerText = "🔴 关闭摄像头";
            startCamera();
        }
    }
    
    function startCamera() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: { width: 280, height: 150 } }, onScanSuccess);
    }
    
    // ==================== 7. 辅助函数 ====================
    function flashSuccess() {
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.opacity = '0'; }, 200);
    }
    
    function showToast(message, duration = 2000) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }
    
    function log(msg, isError = false) {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        if (isError) entry.style.color = '#FF453A';
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
        while (logDiv.children.length > 50) logDiv.removeChild(logDiv.firstChild);
        console.log(msg);
    }
    
    // ==================== 8. 初始化 ====================
    startBtn.addEventListener('click', toggleScanner);
    
    catalogSelect.addEventListener('change', () => {
        const catalog = catalogSelect.value;
        localStorage.setItem('lastCatalog', catalog);
        if (catalog) {
            loadProductsByCatalog(catalog);
        } else {
            productSelect.innerHTML = '<option value="">-- 请先选择目录 --</option>';
            productSelect.disabled = true;
            currentProduct = null;
            updateInfo();
            document.getElementById('current-barcode').style.display = 'none';
        }
    });
    
    productSelect.addEventListener('change', () => {
        const productId = productSelect.value;
        if (productId) {
            localStorage.setItem('lastProductId', productId);
            loadProductDetail(productId);
        } else {
            currentProduct = null;
            document.getElementById('current-barcode').style.display = 'none';
            infoDisplay.innerHTML = "请选择商品";
        }
        updateInfo();
    });
    
    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.addEventListener('click', () => setType(btn.dataset.type, btn));
    });
    
    document.getElementById('product-modal').addEventListener('click', (e) => { 
        if (e.target === document.getElementById('product-modal')) closeModal(); 
    });
    
    // 恢复上次选择的类型
    const lastType = localStorage.getItem('lastType');
    if (lastType && ['Unit', 'Inner', 'Carton'].includes(lastType)) {
        selectedType = lastType;
        document.querySelectorAll('.type-btn').forEach(btn => {
            if (btn.dataset.type === lastType) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    document.getElementById('scan-count').textContent = localStorage.getItem('scanCount') || '0';
    
    // 启动
    fetchCatalogs();
    log("✅ 系统就绪，请选择目录和商品开始扫描");
</script>

</body>
</html>
